<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <!-- Viewport -->
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=5"
    />

    <!-- ── Primary SEO ── -->
    <title>Ask DoGood — Thyroid Healing, Holistic Wellness & Real-Life Growth | DMV</title>
    <meta
      name="description"
      content="Ask DoGood is RoSeé Murphy's real-life platform for thyroid recovery, holistic healing, and sustainable wellness. Evidence-based meal plans, courses, and tools for Black and Brown communities in the DMV and beyond."
    />
    <meta
      name="keywords"
      content="Ask DoGood, RoSeé Murphy, thyroid healing, thyroid recovery, holistic wellness, Black women health, DMV wellness, hypothyroidism, Hashimoto's, GERD recovery, anti-inflammatory diet, meal plans, wellness courses"
    />
    <meta name="author" content="RoSeé Murphy — Ask DoGood" />
    <meta name="theme-color" content="#2D5016" />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://askdogood.com/" />

    <!-- ── Favicon ── -->
    <link rel="icon" type="image/png" href="https://askdogoodassets.blob.core.windows.net/images/AskDoGood_Logo_300x300.png" />
    <link rel="apple-touch-icon" href="https://askdogoodassets.blob.core.windows.net/images/AskDoGood_Logo_300x300.png" />

    <!-- ── Open Graph / Facebook ── -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://askdogood.com/" />
    <meta property="og:site_name" content="Ask DoGood" />
    <meta property="og:title" content="Ask DoGood — Thyroid Healing, Holistic Wellness & Real-Life Growth" />
    <meta
      property="og:description"
      content="RoSeé Murphy's platform for thyroid recovery and whole-life healing. Real food, real structure, and real support — backed by lived experience and evidence-based practice."
    />
    <meta
      property="og:image"
      content="https://askdogoodassets.blob.core.windows.net/images/hero/Mobility.%20Blood%20pressure.%20Energy.%20Healing.%20(4).png"
    />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:locale" content="en_US" />

    <!-- ── Twitter Card ── -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@askdogood" />
    <meta name="twitter:creator" content="@askdogood" />
    <meta name="twitter:title" content="Ask DoGood — Thyroid Healing & Holistic Wellness" />
    <meta
      name="twitter:description"
      content="Real food. Real structure. Real support. AskDoGood is a holistic wellness platform rooted in lived experience, community, and healing."
    />
    <meta
      name="twitter:image"
      content="https://askdogoodassets.blob.core.windows.net/images/hero/Mobility.%20Blood%20pressure.%20Energy.%20Healing.%20(4).png"
    />

    <!-- ── Structured Data (JSON-LD) ── -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "Ask DoGood",
      "alternateName": "AskDoGood",
      "url": "https://askdogood.com",
      "description": "Evidence-based thyroid healing, holistic wellness, and real-life growth tools for Black and Brown communities.",
      "publisher": {
        "@type": "Person",
        "name": "RoSeé Murphy",
        "jobTitle": "Wellness Educator & Founder",
        "url": "https://askdogood.com/about",
        "sameAs": [
          "https://instagram.com/the_real_dogood",
          "https://tiktok.com/@askdogood",
          "https://youtube.com/@roseecm"
        ]
      },
      "potentialAction": {
        "@type": "SearchAction",
        "target": {
          "@type": "EntryPoint",
          "urlTemplate": "https://askdogood.com/blog?q={search_term_string}"
        },
        "query-input": "required name=search_term_string"
      }
    }
    </script>

    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "Ask DoGood",
      "url": "https://askdogood.com",
      "logo": "https://askdogoodassets.blob.core.windows.net/images/AskDoGood_Logo_300x300.png",
      "contactPoint": {
        "@type": "ContactPoint",
        "contactType": "Customer Support",
        "url": "https://askdogood.com/contact"
      },
      "sameAs": [
        "https://instagram.com/the_real_dogood",
        "https://tiktok.com/@askdogood",
        "https://youtube.com/@roseecm",
        "https://facebook.com/askdogood",
        "https://pinterest.com/askdogood"
      ]
    }
    </script>

    <!-- ── Google Fonts — Inter + Playfair Display ── -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:ital,wght@0,600;0,700;0,800;1,600;1,700&display=swap"
      rel="stylesheet"
    />

    <!-- ── Performance hints ── -->
    <link rel="dns-prefetch" href="https://askdogoodassets.blob.core.windows.net" />
    <link rel="preconnect" href="https://askdogoodassets.blob.core.windows.net" />
  </head>

  <body class="bg-background text-foreground antialiased">
    <noscript>
      You need to enable JavaScript to run this app.
    </noscript>

    <!-- React root -->
    <div id="root"></div>

    <!-- Vite entry point (DO NOT change this) -->
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
